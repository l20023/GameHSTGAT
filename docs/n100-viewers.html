<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>n=100 episode viewers — GameHSTGAT</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.25rem; }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .meta a { color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }
    .card header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
    }
    .card header span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.85rem;
    }
    iframe {
      flex: 1;
      width: 100%;
      min-height: 380px;
      border: 0;
      background: #0f172a;
    }
    .card footer {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .card footer a { color: var(--accent); }
  </style>
</head>
<body>
  <h1>Interactive episode viewers — n=100</h1>
  <p class="meta">
    q=0.55 · seed 0 ·
    <a href="viewers.html#fair_1bit|n100|complete">All sizes &amp; models (launcher)</a> ·
    <a href="https://github.com/l20023/GameHSTGAT#interactive-viewers-on-github">README</a>
  </p>
  <div class="grid" id="grid"></div>
  <script>
    const viewers = [
      { mode: "fair_1bit", topo: "complete", label: "Complete" },
      { mode: "fair_1bit", topo: "ws_p_0.0", label: "WS p=0.0" },
      { mode: "fair_1bit", topo: "ws_p_0.1", label: "WS p=0.1" },
      { mode: "vector", topo: "complete", label: "Complete" },
      { mode: "vector", topo: "ws_p_0.0", label: "WS p=0.0" },
      { mode: "vector", topo: "ws_p_0.1", label: "WS p=0.1" },
    ];
    const grid = document.getElementById("grid");
    viewers.forEach(({ mode, topo, label }) => {
      const rel = `../artifacts/animations/${mode}/n_100/q_0p55/${topo}/seed_0.html`;
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <header>${mode} <span>· ${label}</span></header>
        <iframe src="${rel}" title="${mode} ${label}" loading="lazy"></iframe>
        <footer><a href="${rel}" target="_blank" rel="noopener">Open fullscreen</a></footer>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
